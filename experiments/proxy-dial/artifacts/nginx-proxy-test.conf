# Proxy-test upstream — serves SSE / chunked / large / slow / abort endpoints
# over a real Let's Encrypt cert at https://23.145.36.136.sslip.io/

server {
    listen 80;
    listen [::]:80;
    server_name 23.145.36.136.sslip.io;

    # Let webroot ACME renewals work without taking nginx down
    location /.well-known/acme-challenge/ {
        root /var/www/proxy-test;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 23.145.36.136.sslip.io;

    ssl_certificate     /etc/proxy-test/certs/fullchain.pem;
    ssl_certificate_key /etc/proxy-test/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/proxy-test;
    index index.html;

    # Plain root response — small body
    location = / {}

    # Static large body (5 MiB)
    location = /large-5mb.bin {}

    # SSE — emits 5 deterministic events spaced 200ms apart, then closes cleanly
    location = /sse {
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8090/sse;
    }

    # Chunked encoding — one chunk per second for 5 seconds
    location = /chunked {
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8090/chunked;
    }

    # Slow body — TCP-level slow drip over 10s
    location = /slow {
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8090/slow;
    }

    # Abort mid-response — sends partial body then closes connection
    location = /abort {
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8090/abort;
    }

    # Echo headers + body — for verifying the request reached upstream cleanly
    location = /echo {
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8090/echo;
        proxy_set_header X-Original-Host $host;
    }

    # Trailing path test
    location = /sleep-then-200 {
        proxy_buffering off;
        proxy_pass http://127.0.0.1:8090/sleep-then-200;
    }
}
